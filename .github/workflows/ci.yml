name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run lint
        run: poetry run ruff check .

      - name: Run tests
        run: poetry run pytest -q

      - name: Build package
        run: poetry build

      - name: Validate wheel install
        run: |
          python -m venv /tmp/bcch-sdk-wheel-test
          /tmp/bcch-sdk-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/bcch-sdk-wheel-test/bin/python -m pip install dist/*.whl
          /tmp/bcch-sdk-wheel-test/bin/python -c "import bcch_sdk; from bcch_sdk import BCChSyncSDK, BCChConfig, Frequency, SeriesInformation; print(bcch_sdk.__version__, BCChSyncSDK.__name__, BCChConfig.__name__, Frequency.DAILY.value, SeriesInformation.__name__)"
