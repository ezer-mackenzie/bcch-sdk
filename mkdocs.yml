site_name: Banco Central Chile SDK
site_description: Documentación del SDK para interactuar con el Banco Central de Chile.
site_url: https://ezer-mackenzie.github.io/bank-central-chile-sdk/
repo_url: https://github.com/ezer-mackenzie/bank-central-chile-sdk
repo_name: ezer-mackenzie/bank-central-chile-sdk
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
strict: true
nav:
  - Home: index.md
  - Migration Guide: migration.md
  - API Reference: api_reference.md
  - Architecture: architecture.md
  - Usage Examples: usage.md
  - Developer Guide: developer_guide.md
  - Comparison (legacy vs src): comparison.md
  - Comparison Details: comparison_detailed.md
theme:
  name: readthedocs
  locale: es
  highlightjs: true
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ezer-mackenzie/bank-central-chile-sdk
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
